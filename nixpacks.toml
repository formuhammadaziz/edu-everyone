[phases.setup]
aptPkgs = ["libpq-dev", "gcc"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["SECRET_KEY=build-phase-dummy-key python manage.py collectstatic --noinput"]

[start]
cmd = "python manage.py migrate --noinput && gunicorn ielts_platform.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
