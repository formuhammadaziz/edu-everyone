{% extends "base.html" %}
{% block title %}Courses - EduEveryone{% endblock %}

{% block content %}
<div class="mb-4 fade-in-up">
    <h2 class="fw-bold mb-1"><i class="fas fa-book me-2" style="color:var(--accent-light)"></i>Courses</h2>
    <p class="text-muted mb-0">Structured IELTS preparation courses</p>
</div>

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 fade-in-up">
        <div class="card stat-card text-center">
            <div class="card-body py-5">
                <div class="d-flex align-items-center justify-content-center rounded-circle mx-auto mb-3"
                     style="width:80px;height:80px;background:var(--accent-glow);">
                    <i class="fas fa-book fa-2x" style="color:var(--accent-light)"></i>
                </div>
                <h4 class="fw-bold mb-2" style="color:var(--text-primary)">Coming Soon</h4>
