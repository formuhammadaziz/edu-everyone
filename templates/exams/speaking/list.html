{% extends "base.html" %}
{% block title %}Speaking Tests - EduEveryone{% endblock %}

{% block content %}
<div class="mb-4 fade-in-up">
    <h2 class="fw-bold mb-1"><i class="fas fa-microphone me-2" style="color:#06b6d4"></i>Speaking Tests</h2>
    <p class="text-muted mb-0">Practice your IELTS speaking skills</p>
</div>

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 fade-in-up">
        <div class="card stat-card text-center">
            <div class="card-body py-5">
                <div class="d-flex align-items-center justify-content-center rounded-circle mx-auto mb-3"
                     style="width:80px;height:80px;background:rgba(6,182,212,0.1);">
                    <i class="fas fa-microphone fa-2x" style="color:#06b6d4"></i>
                </div>
                <h4 class="fw-bold mb-2" style="color:var(--text-primary)">Coming Soon</h4>
                <p class="text-muted mb-0" style="max-width:360px;margin:0 auto;">
                    Speaking practice tests with recording, sample answers, and AI feedback are currently in development.
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
